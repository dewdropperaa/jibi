# Builds and pushes the Kubernetes Jenkins agent image using the hosted runner
# Docker engine (no Docker Desktop required). Images go to GHCR; Jenkins pulls
# ghcr.io/<owner>/android-ci-agent (use a GHCR pull PAT + imagePullSecret if the
# package is private).
name: Build CI Agent Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'docker/android-ci-agent/**'
      - '.github/workflows/build-agent-image.yml'

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/android-ci-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./docker/android-ci-agent
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
