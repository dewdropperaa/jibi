name: Validate CI/CD Secrets

on:
  # Manual trigger only to safely validate environment readiness.
  workflow_dispatch:

jobs:
  secrets-validation:
    name: Check Required Secrets
    runs-on: ubuntu-latest

    steps:
      # Evaluates required secrets for presence without printing any values.
      - name: Validate required secrets are configured
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          missing=0

          check_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "✅ SET: $name"
            else
              echo "❌ MISSING: $name"
              missing=$((missing + 1))
            fi
          }

          check_secret "KEYSTORE_BASE64" "$KEYSTORE_BASE64"
          check_secret "KEY_ALIAS" "$KEY_ALIAS"
          check_secret "KEY_PASSWORD" "$KEY_PASSWORD"
          check_secret "STORE_PASSWORD" "$STORE_PASSWORD"
          check_secret "FIREBASE_TOKEN" "$FIREBASE_TOKEN"
          check_secret "FIREBASE_APP_ID" "$FIREBASE_APP_ID"
          check_secret "SUPABASE_ACCESS_TOKEN" "$SUPABASE_ACCESS_TOKEN"
          check_secret "SUPABASE_PROJECT_ID" "$SUPABASE_PROJECT_ID"

          if [ "$missing" -gt 0 ]; then
            echo "Required secrets check failed: $missing secret(s) missing."
            exit 1
          fi

          echo "All required secrets are set."
