name: Pipeline Validation Dry-Run

on:
  # Manual trigger only; prevents automatic runs on push/PR.
  workflow_dispatch:

jobs:
  validate-pipeline:
    name: Validate CI/CD Pipeline Safely
    runs-on: ubuntu-latest

    steps:
      # Checks out full history so release notes extraction matches CD behavior.
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Creates a report file used for final summary and artifact upload.
      - name: Initialize dry-run report
        run: |
          {
            echo "# Pipeline Validation Dry-Run Report"
            echo
            echo "| Step | Status | Notes |"
            echo "|---|---|---|"
          } > pipeline_dry_run_report.md

      # Sets up Java 17, matching CI/CD Android toolchain requirements.
      - name: Set up JDK 17
        run: |
          if echo "[PASS] JDK setup delegated to setup-java action"; then
            echo "| Set up JDK 17 | PASSED | Java toolchain configured. |" >> pipeline_dry_run_report.md
          fi
        shell: bash
      - name: Configure JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Restores/saves Gradle cache to mimic CI/CD performance setup.
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Ensures Gradle wrapper can execute in Linux environment.
      - name: Grant execute permission for gradlew
        run: |
          chmod +x ./gradlew
          echo "| Grant execute permission for gradlew | PASSED | gradlew is executable. |" >> pipeline_dry_run_report.md

      # Validates Android keystore decoding exactly like CD without distribution side effects.
      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          echo "| Decode Android keystore | PASSED | Keystore decoded from secret. |" >> pipeline_dry_run_report.md

      # Verifies decoded keystore is a valid keystore container (JKS/PKCS12).
      - name: Validate decoded keystore with keytool
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          keytool -list -keystore release.keystore -storepass "$STORE_PASSWORD" > /dev/null
          echo "| Validate decoded keystore | PASSED | keytool successfully read keystore. |" >> pipeline_dry_run_report.md

      # Runs ktlint checks for Kotlin style issues as in CI.
      - name: Run ktlint
        run: |
          ./gradlew ktlintCheck
          echo "| Run ktlint | PASSED | ktlintCheck completed. |" >> pipeline_dry_run_report.md

      # Runs Detekt static analysis as in CI.
      - name: Run Detekt
        run: |
          ./gradlew detekt
          echo "| Run Detekt | PASSED | detekt completed. |" >> pipeline_dry_run_report.md

      # Runs JVM unit tests for real, matching CI quality gate.
      - name: Run unit tests
        run: |
          ./gradlew test
          echo "| Run unit tests | PASSED | Unit tests completed. |" >> pipeline_dry_run_report.md

      # Notes instrumented tests as intentionally skipped in dry-run to avoid emulator runtime/cost.
      - name: Mark instrumented tests as dry-run skipped
        run: |
          echo "| Run instrumented tests (optional) | SKIPPED | Dry-run workflow intentionally skips emulator execution. |" >> pipeline_dry_run_report.md

      # Runs release assembly in dry-run mode with signing flags to validate task graph and signing wiring.
      - name: Validate release build command (dry-run)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          ./gradlew assembleRelease --dry-run \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          echo "| Build signed release APK | SKIPPED | Executed dry-run assembleRelease only. |" >> pipeline_dry_run_report.md

      # Extracts release notes from latest commit, same mechanism as CD.
      - name: Extract release notes from latest commit
        id: release_notes
        run: |
          echo "message<<EOF" >> "$GITHUB_OUTPUT"
          git log -1 --pretty=%B >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "| Extract release notes | PASSED | Latest commit message captured. |" >> pipeline_dry_run_report.md

      # Installs Firebase CLI to validate tooling setup step from CD.
      - name: Install Firebase CLI
        run: |
          npm install -g firebase-tools
          echo "| Install Firebase CLI | PASSED | firebase-tools installed. |" >> pipeline_dry_run_report.md

      # Replaces real Firebase upload with explicit dry-run message for safety.
      - name: Dry-run Firebase App Distribution
        run: |
          echo "[DRY-RUN] Would upload APK to Firebase App Distribution"
          echo "| Distribute APK to Firebase App Distribution | SKIPPED | Replaced by dry-run echo. |" >> pipeline_dry_run_report.md

      # Notes APK artifact upload as skipped because no real APK is produced in dry-run.
      - name: Mark release APK artifact upload as dry-run skipped
        run: |
          echo "| Upload release APK artifact | SKIPPED | No real release APK generated in dry-run mode. |" >> pipeline_dry_run_report.md

      # Installs Supabase CLI exactly as CD does.
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Records successful Supabase CLI setup in the summary report.
      - name: Record Supabase CLI setup
        run: |
          supabase --version
          echo "| Set up Supabase CLI | PASSED | Supabase CLI available. |" >> pipeline_dry_run_report.md

      # Validates Supabase project link and runs migration command in dry-run mode.
      - name: Run Supabase migration step (dry-run)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push --dry-run
          echo "| Run Supabase production migrations | SKIPPED | supabase db push executed with --dry-run. |" >> pipeline_dry_run_report.md

      # Uploads reports generated by CI-equivalent checks for troubleshooting.
      - name: Upload test and analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-dry-run
          path: |
            **/build/reports/**
            **/build/test-results/**
            **/build/outputs/androidTest-results/**
          if-no-files-found: warn

      # Uploads the dry-run step summary as a dedicated artifact.
      - name: Upload dry-run summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-dry-run-summary
          path: pipeline_dry_run_report.md
          if-no-files-found: error

      # Prints final dry-run summary with PASSED/SKIPPED status per step.
      - name: Final dry-run summary
        if: always()
        run: |
          echo "=== Pipeline Validation Dry-Run Summary ==="
          cat pipeline_dry_run_report.md
