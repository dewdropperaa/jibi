name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Use Node 24 for JS-based actions (avoids Node 20 runner deprecation warnings).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Lint, Analyze, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon

      - name: Run Detekt
        run: ./gradlew detekt --no-daemon

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      # Emulator runs are slow and flaky on free runners; enable manually when needed.
      - name: Run instrumented tests (optional)
        if: ${{ vars.RUN_ANDROID_INSTRUMENTED_TESTS == 'true' }}
        uses: ReactiveCircus/android-emulator-runner@v2
        continue-on-error: true
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect
          script: ./gradlew connectedDebugAndroidTest

      # When ktlint fails, Detekt never runs — so app/build/reports/detekt/ will not exist.
      # This listing appears in the job log when any previous step failed (easier than guessing paths).
      - name: List Gradle reports (on failure)
        if: failure()
        run: |
          echo "Report files under build/ (if any):"
          find . -type f \( -path "./app/build/reports/*" -o -path "./build/reports/*" \) 2>/dev/null | sort || true

      - name: Upload test and analysis reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
            **/build/outputs/androidTest-results/**
          if-no-files-found: warn
