name: Android CD

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-and-distribute:
    name: Build Release, Distribute, and Migrate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Creates release.keystore only when all signing secrets are set. A lone KEYSTORE_BASE64
      # (or missing passwords) would still create a file and force release signingConfig, which
      # then fails at packageRelease — CI would still pass because it never uses that keystore.
      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "${KEYSTORE_BASE64:-}" ] && [ -n "${KEY_ALIAS:-}" ] && [ -n "${KEY_PASSWORD:-}" ] && [ -n "${STORE_PASSWORD:-}" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
            if [ ! -s release.keystore ]; then
              echo "Keystore decode produced an empty file; removing it so Gradle falls back to debug signing."
              rm -f release.keystore
            fi
          else
            echo "Skipping release keystore (set KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, and STORE_PASSWORD together for signed release builds)."
          fi

      # Ensures Gradle wrapper can run on Linux runners.
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Builds a signed release APK using signing credentials from GitHub Secrets.
      - name: Build signed release APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # Plain file avoids shell/YAML breakage when the commit body has quotes or multiple lines.
      - name: Write Firebase release notes
        run: git log -1 --pretty=%B > release-notes.txt

      # secrets cannot be used in step `if:`; gate inside the script instead.
      - name: Distribute to Firebase App Distribution (optional)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          if [ -z "${FIREBASE_TOKEN:-}" ] || [ -z "${FIREBASE_APP_ID:-}" ]; then
            echo "Skipping Firebase App Distribution (secrets not set)."
            exit 0
          fi
          npm install -g firebase-tools
          firebase appdistribution:distribute app/build/outputs/apk/release/app-release.apk \
            --app "$FIREBASE_APP_ID" \
            --groups "internal-team" \
            --release-notes-file release-notes.txt \
            --token "$FIREBASE_TOKEN" \
            || {
              echo "::warning::Firebase App Distribution failed (token, app id, APK path, or tester group). Uploading the release APK artifact anyway."
              exit 0
            }

      # Uploads the release APK as a backup artifact in GitHub Actions.
      - name: Upload release APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Run Supabase production migrations (optional)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_ID:-}" ]; then
            echo "Skipping Supabase (secrets not set)."
            exit 0
          fi
          if ! (npm install -g supabase && supabase link --project-ref "$SUPABASE_PROJECT_ID" && supabase db push); then
            echo "::warning::Supabase install, link, or db push failed; fix credentials or migrations locally."
          fi
          exit 0
