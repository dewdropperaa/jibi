name: Android CD

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-and-distribute:
    name: Build Release, Distribute, and Migrate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Creates release.keystore only when the secret is set (otherwise Gradle uses debug signing).
      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          fi

      # Ensures Gradle wrapper can run on Linux runners.
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Builds a signed release APK using signing credentials from GitHub Secrets.
      - name: Build signed release APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # Captures latest commit message to use as Firebase release notes.
      - name: Extract release notes from latest commit
        id: release_notes
        run: |
          echo "message<<EOF" >> "$GITHUB_OUTPUT"
          git log -1 --pretty=%B >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Install Firebase CLI
        if: ${{ secrets.FIREBASE_TOKEN != '' && secrets.FIREBASE_APP_ID != '' }}
        run: npm install -g firebase-tools

      - name: Distribute APK to Firebase App Distribution
        if: ${{ secrets.FIREBASE_TOKEN != '' && secrets.FIREBASE_APP_ID != '' }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/release/app-release.apk \
            --app "$FIREBASE_APP_ID" \
            --groups "internal-team" \
            --release-notes "${{ steps.release_notes.outputs.message }}" \
            --token "$FIREBASE_TOKEN"

      # Uploads the release APK as a backup artifact in GitHub Actions.
      - name: Upload release APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Set up Supabase CLI
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_PROJECT_ID != '' }}
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run Supabase production migrations
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_PROJECT_ID != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push
