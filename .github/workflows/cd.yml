name: Android CD

on:
  push:
    branches: [main]

jobs:
  release-and-distribute:
    name: Build Release, Distribute, and Migrate
    runs-on: ubuntu-latest

    steps:
      # Checks out full git history so release notes can use latest commit details.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Sets up JDK 17 required by Android Gradle builds.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Caches Gradle dependencies and wrapper for faster release builds.
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Decodes the base64 keystore secret into a file for signing.
      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      # Ensures Gradle wrapper can run on Linux runners.
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Builds a signed release APK using signing credentials from GitHub Secrets.
      - name: Build signed release APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease

      # Captures latest commit message to use as Firebase release notes.
      - name: Extract release notes from latest commit
        id: release_notes
        run: |
          echo "message<<EOF" >> "$GITHUB_OUTPUT"
          git log -1 --pretty=%B >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # Installs Firebase CLI required for App Distribution uploads.
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Uploads the signed APK to Firebase App Distribution for internal testers.
      - name: Distribute APK to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/release/app-release.apk \
            --app "$FIREBASE_APP_ID" \
            --groups "internal-team" \
            --release-notes "${{ steps.release_notes.outputs.message }}" \
            --token "$FIREBASE_TOKEN"

      # Uploads the release APK as a backup artifact in GitHub Actions.
      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
